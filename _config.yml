# 보안 테마 설정
title: 에브리DAI
description: AI 기반 사이버 보안 전문가를 위한 심화 학습 과정

# 테마 설정 - Just the Docs (GitHub Pages 호환)
theme: just-the-docs

# 커스텀 CSS 파일 포함
sass:
  style: compressed

# 네비게이션 설정
nav_enabled: true
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10

# 플러그인
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO 설정
url: "https://khsqowp.github.io"
baseurl: ""
lang: ko_KR

# Just the Docs 설정
color_scheme: light
aux_links:
  "GitHub":
    - "//github.com/khsqowp/khsqowp.github.io"
