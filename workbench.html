<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Security Workbench</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#f7f8fa;color:#191f28;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
    a{color:inherit;text-decoration:none}
    button,input,select,textarea{font:inherit}
    .top{position:sticky;top:0;z-index:10;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid #e5e8eb}
    .nav{max-width:1180px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px}
    .brand{display:flex;align-items:center;gap:10px;font-weight:800}
    .mark{width:30px;height:30px;border-radius:8px;background:#3182f6;color:#fff;display:grid;place-items:center;font-size:15px}
    .home{color:#6b7684;font-size:14px}
    .wrap{max-width:1180px;margin:0 auto;padding:28px 20px 56px}
    .hero{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:end;margin-bottom:22px}
    h1{margin:0 0 10px;font-size:32px;line-height:1.25;letter-spacing:0}
    .lead{margin:0;color:#6b7684;font-size:16px;line-height:1.6}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0}
    .tab{border:1px solid #d1d6db;background:#fff;color:#4e5968;border-radius:999px;padding:10px 16px;cursor:pointer;font-weight:700}
    .tab.on{background:#3182f6;border-color:#3182f6;color:#fff}
    .grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:16px}
    .panel{background:#fff;border:1px solid #e5e8eb;border-radius:8px;padding:18px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
    .panel h2{margin:0 0 14px;font-size:18px}
    .panel h3{margin:18px 0 10px;font-size:14px;color:#4e5968}
    label{display:block;margin:0 0 6px;color:#6b7684;font-size:13px;font-weight:700}
    textarea,input,select{width:100%;border:1px solid #d1d6db;border-radius:8px;background:#fff;color:#191f28;outline:none}
    textarea{min-height:160px;resize:vertical;padding:12px;font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace;font-size:13px;line-height:1.55}
    input,select{height:42px;padding:0 12px}
    textarea:focus,input:focus,select:focus{border-color:#3182f6;box-shadow:0 0 0 3px rgba(49,130,246,.12)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .btn{border:0;border-radius:8px;height:40px;padding:0 14px;font-weight:800;cursor:pointer;background:#3182f6;color:#fff}
    .btn.secondary{background:#f2f4f6;color:#4e5968}
    .btn.danger{background:#fff0f0;color:#f04452}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .recipe{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .step{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#f7f8fa;border:1px solid #e5e8eb;border-radius:8px;padding:8px}
    .step span{font-size:13px;font-weight:700;color:#4e5968}
    .chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
    .chip{border:1px solid #d1d6db;background:#fff;border-radius:999px;padding:8px 10px;color:#4e5968;font-size:13px;font-weight:700;cursor:pointer}
    .section{display:none}
    .section.on{display:block}
    .side{display:flex;flex-direction:column;gap:16px}
    .history-list{display:flex;flex-direction:column;gap:8px;max-height:310px;overflow:auto}
    .history-item{border:1px solid #e5e8eb;border-radius:8px;padding:10px;background:#fff;cursor:pointer}
    .history-item strong{display:block;font-size:13px;margin-bottom:4px}
    .history-item code{display:block;color:#6b7684;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .muted{color:#8b95a1;font-size:13px;line-height:1.5}
    .mono{font-family:"SFMono-Regular",Consolas,"Liberation Mono",monospace}
    .toast{position:fixed;right:20px;bottom:20px;background:#191f28;color:#fff;border-radius:8px;padding:12px 14px;font-weight:700;opacity:0;transform:translateY(8px);transition:.2s;pointer-events:none}
    .toast.show{opacity:1;transform:translateY(0)}
    @media(max-width:900px){.hero,.grid{grid-template-columns:1fr}.side{order:-1}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <header class="top">
    <div class="nav">
      <a class="brand" href="index.html"><span class="mark">S</span><span>Security Workbench</span></a>
      <a class="home" href="index.html">전체 도구</a>
    </div>
  </header>
  <main class="wrap">
    <section class="hero">
      <div>
        <h1>PortSwigger 실습 워크벤치</h1>
        <p class="lead">변환 체인, 요청 생성, SSRF URL 변형, 메모를 한 화면에서 처리합니다.</p>
      </div>
      <button class="btn secondary" onclick="clearWorkspace()">초기화</button>
    </section>

    <nav class="tabs" aria-label="Workbench tabs">
      <button class="tab on" data-tab="pipeline">Recipe</button>
      <button class="tab" data-tab="request">Request</button>
      <button class="tab" data-tab="ssrf">URL / SSRF</button>
      <button class="tab" data-tab="scratch">Scratchpad</button>
    </nav>

    <div class="grid">
      <div>
        <section class="section on" id="pipeline">
          <div class="panel">
            <h2>Recipe Pipeline</h2>
            <label for="pipeInput">Input</label>
            <textarea id="pipeInput" placeholder="&lt;script&gt;alert(1)&lt;/script&gt;"></textarea>
            <div class="row" style="margin-top:12px">
              <div>
                <label for="opSelect">Operation</label>
                <select id="opSelect"></select>
              </div>
              <div>
                <label for="recipeName">Recipe Name</label>
                <input id="recipeName" value="Custom recipe">
              </div>
            </div>
            <div class="actions">
              <button class="btn" onclick="addStep()">스텝 추가</button>
              <button class="btn secondary" onclick="runRecipe()">실행</button>
              <button class="btn secondary" onclick="copyValue('pipeOutput')">결과 복사</button>
              <button class="btn secondary" onclick="saveRecipe()">Recipe 저장</button>
            </div>
            <div class="recipe" id="recipeSteps"></div>
            <h3>Output</h3>
            <textarea id="pipeOutput" readonly></textarea>
            <div class="chips">
              <button class="chip" onclick="loadExample('xss')">XSS 예제</button>
              <button class="chip" onclick="loadExample('jwt')">JWT 예제</button>
              <button class="chip" onclick="loadExample('json')">JSON 예제</button>
            </div>
          </div>
        </section>

        <section class="section" id="request">
          <div class="panel">
            <h2>Request Builder</h2>
            <div class="row">
              <div>
                <label for="reqMethod">Method</label>
                <select id="reqMethod"><option>GET</option><option selected>POST</option><option>PUT</option><option>PATCH</option><option>DELETE</option></select>
              </div>
              <div>
                <label for="reqUrl">URL</label>
                <input id="reqUrl" placeholder="https://target.com/my-account/change-email">
              </div>
            </div>
            <h3>Headers</h3>
            <textarea id="reqHeaders" placeholder="Content-Type: application/x-www-form-urlencoded&#10;Cookie: session=..."></textarea>
            <h3>Body</h3>
            <textarea id="reqBody" placeholder="email=test@example.com&csrf=token"></textarea>
            <div class="actions">
              <button class="btn" onclick="buildRequest()">생성</button>
              <button class="btn secondary" onclick="copyValue('reqOutput')">복사</button>
              <button class="btn secondary" onclick="loadRequestExample()">예제</button>
            </div>
            <h3>Output</h3>
            <select id="reqFormat" onchange="buildRequest()"><option value="raw">Raw HTTP</option><option value="curl">curl</option><option value="fetch">fetch()</option><option value="form">HTML Form</option></select>
            <textarea id="reqOutput" readonly></textarea>
          </div>
        </section>

        <section class="section" id="ssrf">
          <div class="panel">
            <h2>URL / SSRF Helper</h2>
            <label for="urlInput">URL or Host</label>
            <input id="urlInput" placeholder="http://127.0.0.1/admin">
            <div class="actions">
              <button class="btn" onclick="analyzeUrl()">분석</button>
              <button class="btn secondary" onclick="copyValue('urlOutput')">복사</button>
              <button class="btn secondary" onclick="loadUrlExample()">예제</button>
            </div>
            <h3>Result</h3>
            <textarea id="urlOutput" readonly></textarea>
          </div>
        </section>

        <section class="section" id="scratch">
          <div class="panel">
            <h2>Scratchpad</h2>
            <label for="scratchText">Memo</label>
            <textarea id="scratchText" placeholder="랩 URL, 관찰한 응답 차이, 성공한 페이로드를 적어두세요."></textarea>
            <div class="actions">
              <button class="btn" onclick="saveScratch()">저장</button>
              <button class="btn secondary" onclick="copyValue('scratchText')">복사</button>
              <button class="btn danger" onclick="clearScratch()">비우기</button>
            </div>
          </div>
        </section>
      </div>

      <aside class="side">
        <div class="panel">
          <h2>History</h2>
          <div class="history-list" id="historyList"></div>
          <div class="actions">
            <button class="btn secondary" onclick="clearHistory()">기록 삭제</button>
          </div>
        </div>
        <div class="panel">
          <h2>Saved Recipes</h2>
          <div class="history-list" id="recipeList"></div>
        </div>
      </aside>
    </div>
  </main>
  <div class="toast" id="toast">완료</div>

  <script>
    const $=id=>document.getElementById(id);
    const store={
      get:(k,d=[])=>{try{return JSON.parse(localStorage.getItem(k))??d}catch{return d}},
      set:(k,v)=>localStorage.setItem(k,JSON.stringify(v))
    };
    const ops={
      urlEncode:s=>encodeURIComponent(s),
      urlDecode:s=>decodeURIComponent(s),
      doubleUrlEncode:s=>encodeURIComponent(encodeURIComponent(s)),
      doubleUrlDecode:s=>decodeURIComponent(decodeURIComponent(s)),
      base64:s=>btoa(unescape(encodeURIComponent(s))),
      base64Decode:s=>decodeURIComponent(escape(atob(s.replace(/-/g,'+').replace(/_/g,'/')))),
      htmlEntity:s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#x27;'),
      htmlDecimal:s=>[...s].map(c=>`&#${c.codePointAt(0)};`).join(''),
      htmlHex:s=>[...s].map(c=>`&#x${c.codePointAt(0).toString(16)};`).join(''),
      unicode:s=>[...s].map(c=>'\\u'+c.codePointAt(0).toString(16).padStart(4,'0')).join(''),
      fullwidth:s=>[...s].map(c=>{const n=c.charCodeAt(0);return n===32?'　':n>=33&&n<=126?String.fromCharCode(n+0xFEE0):c}).join(''),
      hex:s=>Array.from(new TextEncoder().encode(s)).map(b=>b.toString(16).padStart(2,'0')).join(''),
      hexDecode:s=>new TextDecoder().decode(Uint8Array.from(s.replace(/\s/g,'').match(/.{2}/g).map(h=>parseInt(h,16)))),
      jsonPretty:s=>JSON.stringify(JSON.parse(s),null,2),
      jsonMinify:s=>JSON.stringify(JSON.parse(s)),
      jwtDecode:s=>{const p=s.trim().split('.');if(p.length<2)throw new Error('JWT 형식이 아닙니다');const d=x=>JSON.stringify(JSON.parse(decodeURIComponent(escape(atob(x.replace(/-/g,'+').replace(/_/g,'/').padEnd(Math.ceil(x.length/4)*4,'='))))),null,2);return `HEADER\n${d(p[0])}\n\nPAYLOAD\n${d(p[1])}\n\nSIGNATURE\n${p[2]||''}`},
      lower:s=>s.toLowerCase(),
      upper:s=>s.toUpperCase(),
      trim:s=>s.trim()
    };
    const opLabels={urlEncode:'URL Encode',urlDecode:'URL Decode',doubleUrlEncode:'Double URL Encode',doubleUrlDecode:'Double URL Decode',base64:'Base64 Encode',base64Decode:'Base64 Decode',htmlEntity:'HTML Entity',htmlDecimal:'HTML Decimal Entity',htmlHex:'HTML Hex Entity',unicode:'Unicode \\uXXXX',fullwidth:'Full-Width',hex:'Hex Encode',hexDecode:'Hex Decode',jsonPretty:'JSON Pretty',jsonMinify:'JSON Minify',jwtDecode:'JWT Decode',lower:'Lowercase',upper:'Uppercase',trim:'Trim'};
    let recipe=['urlEncode'];

    document.querySelectorAll('.tab').forEach(btn=>btn.addEventListener('click',()=>setTab(btn.dataset.tab)));
    function init(){
      $('opSelect').innerHTML=Object.entries(opLabels).map(([k,v])=>`<option value="${k}">${v}</option>`).join('');
      $('scratchText').value=localStorage.getItem('scratchpad')||'';
      renderRecipe();renderHistory();renderRecipes();
    }
    function setTab(id){
      document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.tab===id));
      document.querySelectorAll('.section').forEach(s=>s.classList.toggle('on',s.id===id));
    }
    function addStep(){recipe.push($('opSelect').value);renderRecipe()}
    function removeStep(i){recipe.splice(i,1);renderRecipe()}
    function renderRecipe(){
      $('recipeSteps').innerHTML=recipe.length?recipe.map((op,i)=>`<div class="step"><span>${i+1}. ${opLabels[op]}</span><button class="btn secondary" onclick="removeStep(${i})">삭제</button></div>`).join(''):'<p class="muted">스텝을 추가하세요.</p>';
    }
    function runRecipe(){
      let out=$('pipeInput').value;
      try{for(const op of recipe)out=ops[op](out);$('pipeOutput').value=out;addHistory('Recipe',out)}catch(e){$('pipeOutput').value='Error: '+e.message}
    }
    function saveRecipe(){
      const list=store.get('recipes');
      list.unshift({name:$('recipeName').value||'Recipe',steps:[...recipe],at:Date.now()});
      store.set('recipes',list.slice(0,12));renderRecipes();toast('Recipe 저장됨');
    }
    function renderRecipes(){
      const list=store.get('recipes');
      $('recipeList').innerHTML=list.length?list.map((r,i)=>`<div class="history-item" onclick="loadRecipe(${i})"><strong>${escapeHtml(r.name)}</strong><code>${r.steps.map(s=>opLabels[s]).join(' → ')}</code></div>`).join(''):'<p class="muted">저장된 Recipe가 없습니다.</p>';
    }
    function loadRecipe(i){const r=store.get('recipes')[i];if(!r)return;recipe=[...r.steps];$('recipeName').value=r.name;renderRecipe();setTab('pipeline')}
    function addHistory(type,value){
      const list=store.get('history');
      list.unshift({type,value,at:Date.now()});
      store.set('history',list.slice(0,20));renderHistory();
    }
    function renderHistory(){
      const list=store.get('history');
      $('historyList').innerHTML=list.length?list.map((h,i)=>`<div class="history-item" onclick="useHistory(${i})"><strong>${h.type}</strong><code>${escapeHtml(h.value)}</code></div>`).join(''):'<p class="muted">아직 기록이 없습니다.</p>';
    }
    function useHistory(i){const h=store.get('history')[i];if(!h)return;$('pipeInput').value=h.value;setTab('pipeline')}
    function clearHistory(){localStorage.removeItem('history');renderHistory()}
    function parseHeaders(raw){return raw.split(/\n/).map(x=>x.trim()).filter(Boolean).map(line=>{const i=line.indexOf(':');return i<0?[line,'']:[line.slice(0,i).trim(),line.slice(i+1).trim()]})}
    function buildRequest(){
      const method=$('reqMethod').value,url=$('reqUrl').value.trim()||'https://target.local/',body=$('reqBody').value,headers=parseHeaders($('reqHeaders').value),fmt=$('reqFormat').value;
      const u=new URL(url);
      let out='';
      if(fmt==='raw')out=[`${method} ${u.pathname||'/'}${u.search} HTTP/1.1`,`Host: ${u.host}`,...headers.map(([k,v])=>`${k}: ${v}`),'',body].join('\n');
      if(fmt==='curl')out=`curl -i -X ${method} '${url}' ${headers.map(([k,v])=>`-H '${k}: ${v}'`).join(' ')}${body?` --data '${body.replace(/'/g,"'\\''")}'`:''}`;
      if(fmt==='fetch')out=`fetch('${url}', {\n  method: '${method}',\n  headers: ${JSON.stringify(Object.fromEntries(headers),null,2)},\n  body: ${body?JSON.stringify(body):'undefined'}\n})`;
      if(fmt==='form'){const params=new URLSearchParams(body);out=`<form method="${method==='GET'?'GET':'POST'}" action="${escapeHtml(url)}">\n${[...params].map(([k,v])=>`  <input type="hidden" name="${escapeHtml(k)}" value="${escapeHtml(v)}">`).join('\n')}\n  <button type="submit">Submit</button>\n</form>\n<script>document.forms[0].submit()<\\/script>`}
      $('reqOutput').value=out;addHistory('Request',out);
    }
    function loadRequestExample(){$('reqUrl').value='https://target.com/my-account/change-email';$('reqHeaders').value='Content-Type: application/x-www-form-urlencoded\nCookie: session=...';$('reqBody').value='email=test@example.com&csrf=token';buildRequest()}
    function ipLong(ip){const p=ip.split('.').map(Number);return ((p[0]*16777216+p[1]*65536+p[2]*256+p[3])>>>0)}
    function analyzeUrl(){
      const input=$('urlInput').value.trim();const raw=/^https?:\/\//i.test(input)?input:'http://'+input;
      let u;try{u=new URL(raw)}catch(e){$('urlOutput').value='URL 파싱 실패';return}
      const host=u.hostname;const lines=[`protocol: ${u.protocol}`,`host: ${host}`,`port: ${u.port||'(default)'}`,`path: ${u.pathname}`,`query: ${u.search||'(none)'}`,''];
      const locals=['127.0.0.1','localhost','0.0.0.0','[::1]','[::ffff:127.0.0.1]'];
      lines.push('Local targets');locals.forEach(h=>lines.push(`${u.protocol}//${h}${u.pathname}`));
      if(/^\d+\.\d+\.\d+\.\d+$/.test(host)){
        const n=ipLong(host);lines.push('',`IP decimal: ${n}`,`IP hex: 0x${n.toString(16)}`,`IP octal dotted: ${host.split('.').map(x=>'0'+Number(x).toString(8)).join('.')}`,`Short form: ${host.split('.')[0]}.${host.split('.')[1]}.${Number(host.split('.')[2])*256+Number(host.split('.')[3])}`);
      }
      lines.push('', 'Allowlist variants');
      lines.push(`${u.protocol}//allowed.com@${host}${u.pathname}`);
      lines.push(`${u.protocol}//${host}%23.allowed.com${u.pathname}`);
      lines.push(`${u.protocol}//${encodeURIComponent(host)}${u.pathname}`);
      $('urlOutput').value=lines.join('\n');addHistory('URL Helper',$('urlOutput').value);
    }
    function loadUrlExample(){$('urlInput').value='http://127.0.0.1/admin';analyzeUrl()}
    function loadExample(t){
      if(t==='xss'){$('pipeInput').value='<script>alert(1)<\/script>';recipe=['htmlEntity','urlEncode']}
      if(t==='jwt'){$('pipeInput').value='eyJhbGciOiJub25lIiwidHlwIjoiSldUIn0.eyJzdWIiOiJhZG1pbiJ9.';recipe=['jwtDecode']}
      if(t==='json'){$('pipeInput').value='{"user":"admin","role":"tester"}';recipe=['jsonPretty']}
      renderRecipe();runRecipe();
    }
    function saveScratch(){localStorage.setItem('scratchpad',$('scratchText').value);toast('Scratchpad 저장됨')}
    function clearScratch(){$('scratchText').value='';localStorage.removeItem('scratchpad')}
    function clearWorkspace(){document.querySelectorAll('textarea,input').forEach(el=>{if(el.id!=='recipeName')el.value=''});recipe=[];renderRecipe()}
    function copyValue(id){navigator.clipboard.writeText($(id).value||'').then(()=>toast('복사 완료'))}
    function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400)}
    function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
    init();
  </script>
</body>
</html>
